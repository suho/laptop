format = """
$directory\
[薰ｰ](fg:#5E7FC0 bg:#394260)\
$git_branch\
[薰ｰ](fg:#394260)\
$character"""

[character]
format = ' '

[directory]
style = "fg:#e3e5e5 bg:#5E7FC0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "窶ｦ/"

[git_branch]
symbol = "験"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'
